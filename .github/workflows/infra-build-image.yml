name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      python_3_10:
        description: 'Build Python 3.10 image'
        required: false
        default: false
        type: boolean
      python_3_11:
        description: 'Build Python 3.11 image'
        required: false
        default: false
        type: boolean
      python_3_12:
        description: 'Build Python 3.12 image'
        required: false
        default: false
        type: boolean
      python_3_12_cuda_12_9:
        description: 'Build Python 3.12 image Cuda 12.9'
        required: false
        default: false
        type: boolean
      dreamverse_cuda_12_9:
        description: 'Build Dreamverse CUDA 12.9 backend-only and UI images'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.*'


permissions:
  contents: read
  packages: write

concurrency:
  group: infra-build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      py310: ${{ steps.filter.outputs.py310 }}
      py311: ${{ steps.filter.outputs.py311 }}
      py312: ${{ steps.filter.outputs.py312 }}
      py312_cuda: ${{ steps.filter.outputs.py312_cuda }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect changed Dockerfiles
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          base: ${{ github.ref }}
          filters: |
            py310:
              - 'docker/Dockerfile.python3.10'
            py311:
              - 'docker/Dockerfile.python3.11'
            py312:
              - 'docker/Dockerfile.python3.12'
            py312_cuda:
              - 'docker/Dockerfile.python3.12.cuda12.9.1'

  build-python-3-10:
    needs: detect-changes
    if: ${{ !cancelled() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.python_3_10 == 'true') || (github.event_name == 'push' && needs.detect-changes.outputs.py310 == 'true')) }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.10'
      dockerfile_path: docker/Dockerfile.python3.10
      tag_suffix: py3.10
    secrets: inherit

  build-python-3-11:
    needs: detect-changes
    if: ${{ !cancelled() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.python_3_11 == 'true') || (github.event_name == 'push' && needs.detect-changes.outputs.py311 == 'true')) }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.11'
      dockerfile_path: docker/Dockerfile.python3.11
      tag_suffix: py3.11
    secrets: inherit

  build-python-3-12:
    needs: detect-changes
    if: ${{ !cancelled() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.python_3_12 == 'true') || (github.event_name == 'push' && needs.detect-changes.outputs.py312 == 'true')) }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: docker/Dockerfile.python3.12
      tag_suffix: py3.12
    secrets: inherit

  build-python-3-12-cuda-12-9:
    needs: detect-changes
    if: ${{ !cancelled() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.python_3_12_cuda_12_9 == 'true') || (github.event_name == 'push' && needs.detect-changes.outputs.py312_cuda == 'true')) }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: docker/Dockerfile.python3.12.cuda12.9.1
      tag_suffix: py3.12-cuda12.9.1
    secrets: inherit

  build-dreamverse-backend-cuda-12-9:
    if: ${{ github.event.inputs.dreamverse_cuda_12_9 == 'true' }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: apps/dreamverse/docker/Dockerfile
      tag_suffix: dreamverse-backend-cuda12.9.1
      image_name: dreamverse
      build_args: BUILD_DREAMVERSE_UI=0
      include_latest_tags: false
    secrets: inherit

  build-dreamverse-ui-cuda-12-9:
    if: ${{ github.event.inputs.dreamverse_cuda_12_9 == 'true' }}
    uses: ./.github/workflows/_template-build-image.yml
    with:
      python_version: '3.12'
      dockerfile_path: apps/dreamverse/docker/Dockerfile
      tag_suffix: dreamverse-ui-cuda12.9.1
      image_name: dreamverse
      build_args: BUILD_DREAMVERSE_UI=1
      include_latest_tags: false
    secrets: inherit
